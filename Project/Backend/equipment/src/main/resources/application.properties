spring.application.name=equipment-service
server.port=8080
spring.cloud.config.enabled=false

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true


spring.datasource.url=jdbc:mysql://localhost:3306/equipment_db?createDatabaseIfNotExist=true&serverTimezone=Asia/Kolkata&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect